<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EP Command Center — Managed Websites</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* EP tokens (inlined so the dashboard is self-contained) */
:root{
  --gold:#C9A84C; --gold-light:#E8D49A; --black:#050505; --rich:#0a0a0a; --mid:#141414;
  --white:#F8F6F0; --silver:#B8B8B8; --green:#00cc55; --red:#e0554f;
  --disp:'Playfair Display',Georgia,serif; --body:'Montserrat',system-ui,-apple-system,sans-serif;
  --line:rgba(255,255,255,0.08); --glass:rgba(10,10,10,0.72);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--black);color:var(--white);font-family:var(--body);font-weight:300;-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:inherit;text-decoration:none}
.app{display:grid;grid-template-columns:230px 1fr;min-height:100vh}
/* Sidebar */
.side{background:linear-gradient(180deg,var(--rich),var(--black));border-right:1px solid var(--line);padding:26px 18px;display:flex;flex-direction:column;gap:6px;position:sticky;top:0;height:100vh}
.brand{font-family:var(--disp);font-weight:900;font-size:1.25rem;letter-spacing:.02em;margin-bottom:6px}
.brand em{color:var(--gold);font-style:normal}
.brand-sub{font-size:.6rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin-bottom:28px}
.nav{display:flex;flex-direction:column;gap:2px}
.nav button{background:none;border:none;color:rgba(248,246,240,.62);font-family:var(--body);font-size:.82rem;font-weight:500;text-align:left;padding:11px 14px;border-radius:8px;cursor:pointer;transition:.2s;letter-spacing:.02em}
.nav button:hover{color:var(--white);background:rgba(255,255,255,.04)}
.nav button.active{color:var(--black);background:linear-gradient(135deg,var(--gold),var(--gold-light))}
.side-foot{margin-top:auto;font-size:.62rem;color:rgba(248,246,240,.3);letter-spacing:.08em;line-height:1.7}
/* Main */
.main{padding:34px clamp(20px,3.5vw,48px);max-width:1400px}
.top{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:26px}
h1{font-family:var(--disp);font-weight:700;font-size:clamp(1.6rem,3.4vw,2.4rem)}
.stamp{font-size:.72rem;color:rgba(248,246,240,.4);letter-spacing:.04em}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:30px}
.tile{background:var(--rich);border:1px solid var(--line);border-radius:12px;padding:20px 22px}
.tile .n{font-family:var(--disp);font-weight:900;font-size:2rem;line-height:1}
.tile .l{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:rgba(248,246,240,.5);margin-top:8px}
.tile.gold .n{color:var(--gold)} .tile.green .n{color:var(--green)} .tile.red .n{color:var(--red)}
.toolbar{display:flex;gap:12px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.search{flex:1;min-width:180px;background:var(--rich);border:1px solid var(--line);border-radius:9px;padding:11px 14px;color:var(--white);font-family:var(--body);font-size:.85rem}
.search::placeholder{color:rgba(248,246,240,.35)}
.search:focus{outline:2px solid var(--gold-light);outline-offset:1px}
/* Cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
.card{background:linear-gradient(160deg,var(--mid),var(--rich));border:1px solid var(--line);border-radius:14px;padding:22px;transition:.25s;display:flex;flex-direction:column}
.card:hover{border-color:rgba(201,168,76,.4);transform:translateY(-3px)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.name{font-family:var(--disp);font-weight:700;font-size:1.15rem;line-height:1.15}
.meta{font-size:.74rem;color:rgba(248,246,240,.5);margin-top:4px}
.pill{font-size:.62rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:5px 11px;border-radius:999px;white-space:nowrap}
.pill.launch{background:rgba(0,204,85,.16);color:#57e08f;border:1px solid rgba(0,204,85,.4)}
.pill.review{background:rgba(201,168,76,.16);color:var(--gold-light);border:1px solid rgba(201,168,76,.45)}
.pill.fix{background:rgba(224,85,79,.16);color:#f0928d;border:1px solid rgba(224,85,79,.45)}
.pill.draft{background:rgba(184,184,184,.12);color:var(--silver);border:1px solid rgba(184,184,184,.3)}
.demo-tag{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(248,246,240,.35);margin-left:8px}
.row{display:flex;gap:18px;flex-wrap:wrap;margin-top:16px;padding-top:16px;border-top:1px solid var(--line)}
.stat .v{font-family:var(--disp);font-weight:700;font-size:1.1rem}
.stat .k{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(248,246,240,.45);margin-top:2px}
.stat .v.good{color:var(--green)} .stat .v.warn{color:var(--gold)} .stat .v.bad{color:var(--red)}
.deploy{margin-top:14px;font-size:.76rem;color:rgba(248,246,240,.55);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.deploy .dot{width:8px;height:8px;border-radius:50%;background:var(--silver);flex:none}
.deploy a{color:var(--gold);text-decoration:underline;text-underline-offset:2px;word-break:break-all}
.more{margin-top:14px}
.more summary{cursor:pointer;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);list-style:none}
.more summary::-webkit-details-marker{display:none}
.more summary::before{content:'▸ ';}
.more[open] summary::before{content:'▾ ';}
.detail{margin-top:12px;font-size:.78rem;line-height:1.6;color:rgba(248,246,240,.66);display:flex;flex-direction:column;gap:10px}
.detail h4{font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(248,246,240,.4);margin-bottom:4px;font-weight:600}
.detail ul{list-style:none;display:flex;flex-direction:column;gap:3px}
.detail li::before{content:'— ';color:var(--gold)}
.badge{display:inline-block;font-size:.64rem;padding:3px 8px;border-radius:6px;background:rgba(255,255,255,.05);border:1px solid var(--line);margin:2px 4px 2px 0}
.badge.off{color:rgba(248,246,240,.4)}
.empty{padding:60px 20px;text-align:center;color:rgba(248,246,240,.4)}
.hamburger{display:none}
@media(max-width:760px){
  .app{grid-template-columns:1fr}
  .side{position:fixed;left:0;top:0;bottom:0;width:230px;transform:translateX(-100%);transition:.3s;z-index:50}
  .side.open{transform:translateX(0)}
  .hamburger{display:inline-flex;position:fixed;top:16px;right:16px;z-index:60;background:var(--rich);border:1px solid var(--line);color:var(--gold);border-radius:8px;padding:9px 12px;cursor:pointer;font-size:1rem}
  .main{padding-top:64px}
}
</style>
</head>
<body>
<button class="hamburger" id="ham" aria-label="Toggle menu">☰</button>
<div class="app">
  <aside class="side" id="side">
    <div class="brand">EP <em>Command</em></div>
    <div class="brand-sub">Website Factory</div>
    <nav class="nav" id="nav">
      <button data-view="all" class="active">Projects</button>
      <button data-view="deployments">Deployments</button>
      <button data-view="analytics">Analytics</button>
      <button data-view="maintenance">Maintenance</button>
    </nav>
    <div class="side-foot">
      Elite Prodigy Media<br>Factory registry<br><span id="foot-time"></span>
    </div>
  </aside>

  <main class="main">
    <div class="top">
      <div>
        <h1 id="view-title">Managed Websites</h1>
        <div class="stamp" id="stamp"></div>
      </div>
    </div>

    <div class="tiles" id="tiles"></div>

    <div class="toolbar">
      <input class="search" id="search" placeholder="Search projects…" aria-label="Search projects">
    </div>

    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none">No projects match.</div>
  </main>
</div>

<script>
const state = { view:'all', q:'', data:null };

async function load(){
  try{
    const res = await fetch('./projects.json', {cache:'no-store'});
    state.data = await res.json();
  }catch(e){
    document.getElementById('grid').innerHTML =
      '<div class="empty">Could not load <code>projects.json</code>. Run <code>npm run ep:projects</code> and serve the factory folder.</div>';
    return;
  }
  document.getElementById('stamp').textContent =
    state.data.count + ' projects · generated ' + new Date(state.data.generatedAt).toLocaleString();
  document.getElementById('foot-time').textContent = new Date(state.data.generatedAt).toLocaleDateString();
  renderTiles(); render();
}

function renderTiles(){
  const s = state.data.summary;
  document.getElementById('tiles').innerHTML = [
    ['gold', s.total, 'Total Sites'],
    ['green', s.launchReady, 'Launch-Ready'],
    ['gold', s.inReview, 'In Client Review'],
    ['red', s.needsWork, 'Needs Work'],
  ].map(([cls,n,l])=>`<div class="tile ${cls}"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');
}

const pillClass = p => p.launchReady ? 'launch' : (p.reviewReady ? 'review' : (p.built ? 'fix' : 'draft'));
const lhClass = v => v>=90?'good':(v>=70?'warn':'bad');

function card(p){
  const lh = p.lighthouse;
  const perf = lh ? `<div class="stat"><div class="v ${lhClass(lh.performance)}">${lh.performance}</div><div class="k">Perf</div></div>
    <div class="stat"><div class="v ${lhClass(lh.accessibility)}">${lh.accessibility}</div><div class="k">A11y</div></div>
    <div class="stat"><div class="v ${lhClass(lh.seo)}">${lh.seo}</div><div class="k">SEO</div></div>` :
    `<div class="stat"><div class="v">—</div><div class="k">Lighthouse</div></div>`;

  const review = p.blockers.review.length ? `<div><h4>Blocking review</h4><ul>${p.blockers.review.map(b=>`<li>${esc(b)}</li>`).join('')}</ul></div>`:'';
  const launch = p.blockers.launch.length ? `<div><h4>Before public launch</h4><ul>${p.blockers.launch.map(b=>`<li>${esc(b)}</li>`).join('')}</ul></div>`:'';
  const pend = p.counts.pendingVerification ? `<div><h4>Pending client verification</h4><div>${p.counts.pendingVerification} item(s) — see BUILD-REPORT</div></div>`:'';

  const analytics = `<span class="badge ${p.analytics.connected?'':'off'}">Analytics: ${p.analytics.connected?p.analytics.provider:'not connected'}</span>`;
  const maint = `<span class="badge ${p.maintenance.plan?'':'off'}">Care plan: ${p.maintenance.plan||'none'}</span>
    <span class="badge ${p.maintenance.notificationDocumented?'':'off'}">Form notify: ${p.maintenance.notificationDocumented?'set':'pending'}</span>`;

  return `<article class="card" data-name="${esc((p.businessName+' '+p.industry+' '+p.location).toLowerCase())}">
    <div class="card-top">
      <div><div class="name">${esc(p.businessName)}${p.demo?'<span class="demo-tag">demo</span>':''}</div>
        <div class="meta">${esc(p.industry)}${p.location?' · '+esc(p.location):''}</div></div>
      <span class="pill ${pillClass(p)}">${esc(p.status)}</span>
    </div>
    <div class="row">
      <div class="stat"><div class="v">${p.counts.services}</div><div class="k">Services</div></div>
      ${perf}
      <div class="stat"><div class="v ${p.maintenance.plan?'warn':''}">${p.maintenance.plan||'—'}</div><div class="k">Care</div></div>
    </div>
    <div class="deploy"><span class="dot"></span><span>${p.deployment.live?'Live':'Preview'}</span> · <a href="${esc(p.deployment.url)}" target="_blank" rel="noopener">${esc(p.deployment.url)}</a></div>
    <details class="more"><summary>Details</summary>
      <div class="detail">
        <div>${analytics}${maint}</div>
        ${review}${launch}${pend}
        <div><h4>Deployment</h4><div>${esc(p.deployment.note)}${p.deployment.lastBuilt?' · last built '+new Date(p.deployment.lastBuilt).toLocaleDateString():''}</div></div>
      </div>
    </details>
  </article>`;
}

function render(){
  const titles={all:'Managed Websites',deployments:'Deployments',analytics:'Analytics',maintenance:'Maintenance'};
  document.getElementById('view-title').textContent = titles[state.view];
  let list = state.data.projects.slice();
  if(state.view==='analytics') list.sort((a,b)=>(b.analytics.connected)-(a.analytics.connected));
  if(state.view==='maintenance') list = list.filter(p=>p.maintenance.plan);
  if(state.view==='deployments') list.sort((a,b)=>(b.launchReady)-(a.launchReady));
  if(state.q){ const q=state.q.toLowerCase(); list=list.filter(p=>(p.businessName+' '+p.industry+' '+p.location).toLowerCase().includes(q)); }
  const grid=document.getElementById('grid');
  grid.innerHTML = list.map(card).join('');
  document.getElementById('empty').style.display = list.length?'none':'block';
}

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

document.getElementById('nav').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  document.querySelectorAll('#nav button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); state.view=b.dataset.view; render();
  document.getElementById('side').classList.remove('open');
});
document.getElementById('search').addEventListener('input',e=>{state.q=e.target.value;render();});
document.getElementById('ham').addEventListener('click',()=>document.getElementById('side').classList.toggle('open'));

load();
</script>
</body>
</html>
